<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JK Slides — Contador Público Jano Krivzov</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; background: #ccc6bc; min-height: 100vh; padding: 40px 20px; }
  h1 { color: #1a1a1a; font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
  p.sub { color: #5a6a7a; font-size: 13px; text-align: center; margin-bottom: 32px; }
  .grid { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
  .card { background: #f5efe4; border-radius: 14px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); width: 320px; }
  .card h2 { font-size: 14px; font-weight: 800; color: #2c6b90; text-align: center; }
  .card p { font-size: 11px; color: #7a8a96; text-align: center; }
  .empty { color: #aaa; font-size: 13px; text-align: center; padding: 40px; }
</style>
</head>
<body>
  <h1>JK Slides</h1>
  <p class="sub">Contador Público Jano Krivzov — Mis diseños para redes sociales</p>
  <div class="grid">
    <div class="card">
      <h2>¡Bienvenido!</h2>
      <p>Acá van a aparecer tus diseños listos para descargar. Claude los va subiendo a medida que los generás.</p>
    </div>
  </div>
</body>
</html>
